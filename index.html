<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

  <title>Công lệnh</title>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Công lệnh">
<link rel="icon" type="image/png" href="icons/icon-192.png?v=130">
<link rel="apple-touch-icon" sizes="1024x1024" href="logo.png?v=130">
<link rel="manifest" href="manifest.json?v=130">
</script>
  <!-- Font giao diện -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap"
  rel="stylesheet"
>
  <link rel="stylesheet" href="css/style.css?v=130">
</head>
<script src="js/app.js?v=130"></script>
<body>
  <header class="header">
    <div class="brand">
      <img class="brand-logo" src="logo.png?v=130" alt="Logo Trung tâm">
      <div>
        <h1>Giấy công lệnh, giấy đi đường</h1>
        <p>Trung tâm Bảo trợ xã hội Tân Hiệp</p>
      </div>
    </div>

    <h2 id="pageTitle">Trang chủ</h2>
  </header>

  <section id="home" class="screen active">
    <div class="card">
      <h3>📊 Dashboard</h3>

      <div class="dashboard dashboard-2col">
        <div>
          <span>Số tiếp CL</span>
          <h2 id="soTiepTheoCL">-</h2>
        </div>

        <div>
          <span>Số tiếp GGT</span>
          <h2 id="soTiepTheoGGT">-</h2>
        </div>

        <div>
          <span>Tổng CL</span>
          <h2 id="tongCL">-</h2>
        </div>

        <div>
          <span>Tổng GGT</span>
          <h2 id="tongGGT">-</h2>
        </div>

        <div>
          <span>Hủy CL</span>
          <h2 id="huyCL">-</h2>
        </div>

        <div>
          <span>Hủy GGT</span>
          <h2 id="huyGGT">-</h2>
        </div>
      </div>
    </div>
      <div class="home-actions">
  <button onclick="showScreen('cap', this)">
    ➕ Cấp văn bản
  </button>

  <button onclick="showScreen('nhatky', this)">
    📒 Nhật ký
  </button>
    </div>
  </section>

  <section id="cap" class="screen">
    <div class="card">
      <h3>📄 Cấp văn bản</h3>

      <label>Loại giấy</label>
      <select id="loaiGiay" onchange="doiLoaiGiay()">
        <option value="CONG_LENH">Công lệnh</option>
        <option value="GIAY_GIOI_THIEU">Giấy giới thiệu</option>
      </select>

      <hr>

      <label>Đồng chí</label>
      <input id="dongChi" placeholder="Nhập họ tên">
      <button type="button" class="check-btn" onclick="kiemTraCapLai()">
  🔎 Kiểm tra lịch sử cấp
</button>

<div id="lichSuCapLai" class="history-box" style="display:none"></div>

      <label>Tuổi</label>
      <input id="tuoi" placeholder="Nhập tuổi nếu có">

      <label>Chức vụ</label>
      <input id="chucVu" placeholder="Ví dụ: Nhân viên">

      <div id="formCL">
        <label>Đi từ</label>
        <input id="diTu" value="TTBTXH Tân Hiệp">

        <label>Đến</label>
        <select id="den" onchange="chonNoiDen()">
          <option>TTYT KV Bình Long</option>
          <option>BV ĐK Bình Phước</option>
          <option>BV Chợ Rẫy</option>
          <option>Khác...</option>
        </select>

        <input id="denKhac" style="display:none" placeholder="Nhập nơi đến khác">

        <label>Nội dung công tác</label>
        <textarea id="noiDung" placeholder="Nhập nội dung công tác"></textarea>

        <label>Ngày đi</label>
        <input type="date" id="ngayDi">

        <label>Ngày về</label>
        <input type="date" id="ngayVe">

        <label>Phương tiện</label>
        <input id="phuongTien" placeholder="Ví dụ: Tự túc">

        <label>Giấy tờ kèm theo</label>
        <input id="giayTo" placeholder="Nếu có">
      </div>

      <div id="formGGT" style="display:none">
        <label>Kính gửi</label>
        <input id="kinhGui" placeholder="Nhập cơ quan kính gửi">

        <label>Nơi đến</label>
        <select id="noiDen">
          <option>TTYT KV Bình Long</option>
          <option>BV ĐK Bình Phước</option>
          <option>BV Chợ Rẫy</option>
          <option>Khác...</option>
        </select>

        <input id="noiDenKhac" style="display:none" placeholder="Nhập nơi đến khác">

        <label>Về việc</label>
        <textarea id="noiDungGGT" placeholder="Nhập nội dung / về việc"></textarea>

        <label>Có giá trị đến hết ngày</label>
        <input type="date" id="ngayHetHan">
      </div>

      <label>Ngày cấp trên giấy</label>
      <input type="date" id="ngayCapGiay">

      <label>Phòng/Khu</label>
      <select id="phongKhu">
        <option>Ban Giám đốc</option>
        <option>Phòng Tổ chức - Hành chính</option>
        <option>Phòng Kế hoạch - Tài chính</option>
        <option>Phòng Công tác xã hội</option>
        <option>Phòng Y tế</option>
        <option>Khu I</option>
        <option>Khu II</option>
        <option>Khu III</option>
      </select>

      <button onclick="capCongLenh()">📄 Xuất PDF</button>

      <div id="ketqua"></div>
    </div>
  </section>
  <section id="nhatky" class="screen">
  <div class="card">
    <h3>📒 Nhật ký</h3>

    <div class="search-box">
  <input
    id="timKiemNhatKy"
    type="text"
    placeholder="🔍 Tìm tên, số CL/GGT, nội dung, phòng/khu..."
    oninput="locNhatKy()"
  >
</div>

<div class="filter-box">
  <input type="date" id="tuNgay" onchange="locNhatKy()">

  <input type="date" id="denNgay" onchange="locNhatKy()">

  <select id="locLoai" onchange="locNhatKy()">
    <option value="">Tất cả loại giấy</option>
    <option value="CONG_LENH">Công lệnh</option>
    <option value="GIAY_GIOI_THIEU">Giấy giới thiệu</option>
  </select>

  <select id="locPhong" onchange="locNhatKy()">
    <option value="">Tất cả phòng/khu</option>
    <option>Ban Giám đốc</option>
    <option>Phòng Tổ chức - Hành chính</option>
    <option>Phòng Kế hoạch - Tài chính</option>
    <option>Phòng Công tác xã hội</option>
    <option>Phòng Y tế</option>
    <option>Khu I</option>
    <option>Khu II</option>
    <option>Khu III</option>
  </select>

  <button type="button" onclick="resetLoc()">♻️ Đặt lại bộ lọc</button>
</div>

<div id="baoCaoList">Đang tải...</div>
  </div>
</section>

  <nav>
    <button class="nav-btn active" onclick="showScreen('home', this)">
      🏠<br>Trang chủ
    </button>

    <button class="nav-btn" onclick="showScreen('cap', this)">
      ➕<br>Cấp
    </button>

    <button class="nav-btn" onclick="showScreen('nhatky', this)">
      📒<br>Nhật ký
    </button>
  </nav>

  <script src="js/app.js?v=130"></script>
</body>
</html>
