<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Công lệnh</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="app">
    <div id="updateBox" style="display:none;" class="update-box">
  <div>
    🔄 Có phiên bản mới
    <br>
    <small id="updateText">Bấm cập nhật để tải bản mới nhất.</small>
  </div>
  <button onclick="capNhatUngDung()">Cập nhật ngay</button>
</div>
    <header class="hero">
      <h1>Công lệnh</h1>
      <p>Trung tâm Bảo trợ xã hội Tân Hiệp</p>
      <h2 id="pageTitle">Trang chủ</h2>
    </header>

    <main class="main">
      <section id="home" class="screen active">
        <div class="card">
          <h3>📊 Dashboard</h3>
          <div class="grid">
            <div><span>Số cuối</span><b id="soCuoi">-</b></div>
            <div><span>Số tiếp theo</span><b id="soTiepTheo">-</b></div>
            <div><span>Tổng đã cấp</span><b id="tongCongLenh">-</b></div>
          </div>
        </div>

        <div class="card">
          <h3>⚡ Chức năng</h3>
          <button class="menu-btn" onclick="showScreen('cap')">➕ Cấp công lệnh</button>
          <button class="menu-btn" onclick="showScreen('nhatky')">📒 Nhật ký / Báo cáo</button>
        </div>
      </section>

      <section id="cap" class="screen">
        <div class="card">
          <h3>➕ Cấp công lệnh</h3>

          <label for="dongChi">Đồng chí</label>
          <input id="dongChi" placeholder="Nhập họ tên">

          <label for="tuoi">Tuổi</label>
          <input id="tuoi" placeholder="Nhập tuổi">

          <label for="chucVu">Chức vụ</label>
          <input id="chucVu" placeholder="Ví dụ: Viên chức">

          <label for="diTu">Đi từ</label>
          <input id="diTu" value="TTBTXH Tân Hiệp">

          <label for="den">Đến</label>
          <select id="denSelect" onchange="xuLyNoiDenKhac()">
  <option value="TTYT KV Bình Long">TTYT KV Bình Long</option>
  <option value="Bệnh viện ĐK Bình Phước">Bệnh viện ĐK Bình Phước</option>
  <option value="Bệnh viện Chợ Rẫy">Bệnh viện Chợ Rẫy</option>
  <option value="Khác">Khác</option>
</select>

<input id="denKhac" placeholder="Nhập nơi đến khác" style="display:none; margin-top:10px;">

          <label for="noiDung">Nội dung công tác</label>
          <textarea id="noiDung" placeholder="Nhập nội dung"></textarea>

          <label for="ngayDi">Ngày đi</label>
          <input id="ngayDi" type="date">

          <label for="ngayVe">Ngày về</label>
          <input id="ngayVe" type="date">

          <label for="phuongTien">Phương tiện</label>
          <input id="phuongTien" placeholder="Ví dụ: Tự túc">

          <label for="giayTo">Giấy tờ kèm theo</label>
          <input id="giayTo" placeholder="Nếu có">

          <label for="phongKhu">Phòng/Khu</label>
          <select id="phongKhu">
            <option value="Ban Giám đốc">Ban Giám đốc</option>
            <option value="Phòng Tổ chức - Hành chính">Phòng Tổ chức - Hành chính</option>
            <option value="Phòng Công tác xã hội">Phòng Công tác xã hội</option>
            <option value="Phòng Y tế">Phòng Y tế</option>
            <option value="Phòng Kế hoạch - Tài chính">Phòng Kế hoạch - Tài chính</option>
            <option value="Khu I">Khu I</option>
            <option value="Khu II">Khu II</option>
            <option value="Khu III">Khu III</option>
          </select>

          <button class="primary" onclick="capCongLenh()">📄 Xuất công lệnh PDF</button>

          <div id="ketqua"></div>
        </div>
      </section>

      <section id="nhatky" class="screen">
        <div class="card">
          <h3>📒 Nhật ký / Báo cáo theo Phòng, Khu</h3>
          <div id="baoCaoList"></div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" onclick="showScreen('home', this)">🏠<br>Trang chủ</button>
      <button class="nav-btn" onclick="showScreen('cap', this)">➕<br>Cấp</button>
      <button class="nav-btn" onclick="showScreen('nhatky', this)">📒<br>Nhật ký</button>
    </nav>
  </div>

  <script src="js/app.js?v=20260701"></script>
</body>
</html>
