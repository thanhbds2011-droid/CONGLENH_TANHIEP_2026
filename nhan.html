<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Xác nhận nhận văn bản</title>

  <meta name="theme-color" content="#2563eb">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Be Vietnam Pro", Arial, Helvetica, sans-serif;
      background: #eef4fb;
      color: #0f172a;
      min-height: 100vh;
      padding: 18px;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
    }

    .header {
      background: linear-gradient(135deg, #2563eb, #22c55e);
      color: white;
      padding: 28px 20px 58px;
      border-radius: 28px;
      margin-bottom: -38px;
    }

    .header h1 {
      margin: 0;
      font-size: 23px;
      font-weight: 800;
      line-height: 1.25;
    }

    .header p {
      margin: 8px 0 0;
      opacity: 0.92;
      font-size: 14px;
    }

    .card {
      position: relative;
      background: white;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 14px 35px rgba(15, 23, 42, 0.12);
    }

    h2 {
      margin: 0 0 8px;
      color: #1d4ed8;
      font-size: 20px;
      font-weight: 800;
      text-align: center;
    }

    .sub {
      text-align: center;
      color: #64748b;
      font-size: 13px;
      margin-bottom: 18px;
      line-height: 1.45;
    }

    label {
      display: block;
      margin: 14px 0 7px;
      font-weight: 800;
      font-size: 14px;
    }

    input,
    select {
      width: 100%;
      height: 48px;
      border: 1.5px solid #cbd5e1;
      border-radius: 16px;
      padding: 0 14px;
      font-size: 16px;
      outline: none;
      background: white;
      color: #0f172a;
    }

    input:focus,
    select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    .check {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-top: 16px;
      color: #334155;
      font-size: 14px;
      line-height: 1.45;
    }

    .check input {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      flex-shrink: 0;
    }

    button {
      display: block;
      width: 100%;
      margin-top: 18px;
      border: none;
      border-radius: 17px;
      padding: 15px 14px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .secondary {
      background: #eff6ff;
      color: #1d4ed8;
    }

    .msg {
      display: none;
      margin-top: 16px;
      padding: 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      font-weight: 600;
    }

    .msg.ok {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .msg.err {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .note {
      margin-top: 14px;
      text-align: center;
      color: #64748b;
      font-size: 12.5px;
      line-height: 1.45;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <h1>📄 Xác nhận nhận văn bản</h1>
      <p>Trung tâm Bảo trợ xã hội Tân Hiệp</p>
    </div>

    <div class="card">
      <h2>Quét QR để xác nhận</h2>
      <div class="sub">
        Chọn đúng loại văn bản, nhập số văn bản và họ tên như trên giấy đã cấp.
      </div>

      <form id="formNhan">
        <label for="loai">Loại văn bản</label>
        <select id="loai" required>
          <option value="">-- Chọn loại văn bản --</option>
          <option value="cong-lenh">Công lệnh</option>
          <option value="giay-gioi-thieu">Giấy giới thiệu</option>
        </select>

        <label for="soVanBan">Số văn bản</label>
        <input id="soVanBan" type="text" inputmode="numeric" placeholder="Ví dụ: 649" required>

        <label for="hoTen">Họ và tên</label>
        <input id="hoTen" type="text" placeholder="Nhập họ và tên" required>

        <div class="check">
          <input id="dongY" type="checkbox" required>
          <span>Tôi xác nhận đã nhận văn bản nêu trên.</span>
        </div>

        <button id="btnGui" type="submit">XÁC NHẬN ĐÃ NHẬN</button>
        <button type="button" class="secondary" onclick="window.location.href='index.html?v=138'">
          ⬅️ Về trang chính
        </button>

        <div id="msg" class="msg"></div>
      </form>

      <div class="note">
        Nếu nhập sai số văn bản hoặc họ tên, hệ thống sẽ không ghi nhận.
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzsBlbmfyzecmKurNXbyz4oFCEvV9y472P4xbiba-gvE9a3yOSmzNHvF_aSe0HEMrt0/exec";
    const API_TOKEN = "CONGLENH_TANHIEP_2026";

    const form = document.getElementById("formNhan");
    const btnGui = document.getElementById("btnGui");
    const msg = document.getElementById("msg");

    function showMessage(type, text) {
      msg.className = "msg " + type;
      msg.innerHTML = text;
    }

    function goiApiNhan(params) {
      return new Promise(function(resolve, reject) {
        const cbName = "cb_nhan_" + Date.now() + "_" + Math.floor(Math.random() * 100000);

        params = params || {};
        params.action = "xacNhanNhanVanBan";
        params.token = API_TOKEN;
        params.callback = cbName;

        const query = Object.keys(params)
          .map(k => encodeURIComponent(k) + "=" + encodeURIComponent(params[k]))
          .join("&");

        const script = document.createElement("script");
        script.src = API_URL + "?" + query;

        const timeout = setTimeout(function() {
          delete window[cbName];
          script.remove();
          reject(new Error("Hệ thống xử lý lâu hơn bình thường."));
        }, 60000);

        window[cbName] = function(res) {
          clearTimeout(timeout);
          delete window[cbName];
          script.remove();
          resolve(res);
        };

        script.onerror = function() {
          clearTimeout(timeout);
          delete window[cbName];
          script.remove();
          reject(new Error("Không kết nối được hệ thống."));
        };

        document.body.appendChild(script);
      });
    }

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      const loai = document.getElementById("loai").value.trim();
      const soVanBan = document.getElementById("soVanBan").value.trim();
      const hoTen = document.getElementById("hoTen").value.trim();
      const dongY = document.getElementById("dongY").checked;

      if (!loai || !soVanBan || !hoTen || !dongY) {
        showMessage("err", "⚠️ Vui lòng nhập đầy đủ thông tin và tích xác nhận.");
        return;
      }

      btnGui.disabled = true;
      btnGui.textContent = "ĐANG GỬI...";
      showMessage("ok", "⏳ Đang kiểm tra thông tin, vui lòng chờ...");

      try {
        const data = await goiApiNhan({
          loai: loai,
          soVanBan: soVanBan,
          hoTen: hoTen
        });

        if (data && data.ok) {
          showMessage(
            "ok",
            `✅ <b>${data.message}</b><br>
             Loại: <b>${data.loaiTen || ""}</b><br>
             Số văn bản: <b>${data.soVanBan || ""}</b><br>
             Họ và tên: <b>${data.hoTen || ""}</b><br>
             Thời gian: <b>${data.thoiGian || ""}</b>`
          );

          form.reset();
        } else {
          showMessage("err", "❌ " + ((data && data.message) ? data.message : "Không xác nhận được."));
        }

      } catch (err) {
        showMessage("err", "❌ Không gửi được xác nhận. Vui lòng kiểm tra kết nối hoặc liên hệ bộ phận phụ trách.");
      } finally {
        btnGui.disabled = false;
        btnGui.textContent = "XÁC NHẬN ĐÃ NHẬN";
      }
    });
  </script>
</body>
</html>
